name: 自动收录 Issue

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  contents: write
  issues: write

jobs:
  ingest:
    if: ${{ !github.event.issue.pull_request && startsWith(github.event.issue.title, '[新增账号]') }}
    runs-on: ubuntu-latest
    env:
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinyin helper
        run: python -m pip install --upgrade pypinyin

      - name: Ingest issue and generate lists
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import unicodedata
          from datetime import date
          from pypinyin import lazy_pinyin

          root = pathlib.Path('.')
          source_dir = root / '数据源'
          out_dir = root / '账号名单'
          source_dir.mkdir(exist_ok=True)
          out_dir.mkdir(exist_ok=True)

          body = os.environ.get('ISSUE_BODY', '')
          author = os.environ.get('ISSUE_AUTHOR', 'unknown')
          issue_number = os.environ.get('ISSUE_NUMBER', '')
          today = date.today().isoformat()

          platform_file = {
              '抖音': '抖音.json',
              '哔哩哔哩': '哔哩哔哩.json',
              '小红书': '小红书.json',
              '微信公众号': '微信公众号.json',
              '微信视频号': '微信视频号.json',
          }
          platform_code = {
              '抖音': 'douyin',
              '哔哩哔哩': 'bilibili',
              '小红书': 'xiaohongshu',
              '微信公众号': 'wechat_public_accounts',
              '微信视频号': 'wechat_channels',
          }

          def get_section(title):
              pattern = rf'### {re.escape(title)}\s*\n\n(.*?)(?=\n### |\Z)'
              match = re.search(pattern, body, flags=re.S)
              if not match:
                  return ''
              value = match.group(1).strip()
              return '' if value == '_No response_' else value

          def clean(value):
              return unicodedata.normalize('NFKC', str(value or '')).strip()

          def norm(value):
              text = clean(value).lower()
              return re.sub(r'\s+', ' ', text)

          def make_sort_name(name):
              name = clean(name)
              parts = []
              for token in re.findall(r'[A-Za-z0-9]+|[\u4e00-\u9fff]+|[^\s]', name):
                  if re.fullmatch(r'[\u4e00-\u9fff]+', token):
                      parts.extend(lazy_pinyin(token))
                  else:
                      parts.append(token.lower())
              return norm(' '.join(parts))

          def parse_lines(text):
              result = []
              for line in str(text or '').splitlines():
                  line = line.strip()
                  if line and line != '_No response_':
                      result.append(line)
              return result

          def sort_key(item):
              return (
                  norm(item.get('排序名')),
                  norm(item.get('平台')),
                  norm(item.get('平台UID')),
                  norm(item.get('账号名称')),
              )

          def tier_name(count):
              if 1 <= count <= 5:
                  return '一级疑似'
              if 6 <= count <= 100:
                  return '二级疑似'
              if count >= 101:
                  return '三级疑似'
              return None

          def md_link(url):
              url = clean(url)
              if not url:
                  return ''
              return f"[主页]({url.replace(')', '%29').replace('(', '%28')})"

          platform = clean(get_section('平台'))
          uid = clean(get_section('平台 UID / 唯一标识'))
          account_name = clean(get_section('账号名称'))
          homepage = clean(get_section('主页链接'))
          evidence = parse_lines(get_section('证据链接'))
          reason = clean(get_section('疑似原因'))

          errors = []
          if platform not in platform_file:
              errors.append('平台缺失或暂不支持。')
          if not uid:
              errors.append('平台 UID / 唯一标识缺失。')
          if not account_name:
              errors.append('账号名称缺失。')
          if errors:
              pathlib.Path('处理结果.md').write_text('自动收录失败：\n\n' + '\n'.join(f'- {e}' for e in errors) + '\n', encoding='utf-8')
              raise SystemExit(1)

          path = source_dir / platform_file[platform]
          if path.exists():
              data = json.loads(path.read_text(encoding='utf-8'))
          else:
              data = {
                  '平台': platform,
                  '平台代码': platform_code[platform],
                  '说明': f'本文件为{platform}平台疑似 AI 内容账号的权威数据源。',
                  '排序规则': '按 排序名 升序排列；中文按拼音，英文按 a-z。',
                  '更新时间': today,
                  '账号': [],
              }

          accounts = data.setdefault('账号', [])
          target = next((item for item in accounts if clean(item.get('平台UID')) == uid), None)
          changed_type = '新增'

          if target is None:
              target = {
                  '平台UID': uid,
                  '账号名称': account_name,
                  '排序名': make_sort_name(account_name),
                  '主页链接': homepage,
                  '提交人数': 1,
                  '提交者': [author],
                  '证据链接': evidence,
                  '疑似原因': reason,
                  '状态': '疑似',
              }
              accounts.append(target)
          else:
              changed_type = '更新'
              submitters = target.setdefault('提交者', [])
              if author not in submitters:
                  submitters.append(author)
                  target['提交人数'] = int(target.get('提交人数', 0)) + 1
              else:
                  changed_type = '重复提交，未增加计数'
              if homepage and not clean(target.get('主页链接')):
                  target['主页链接'] = homepage
              if evidence:
                  old = target.setdefault('证据链接', [])
                  for link in evidence:
                      if link not in old:
                          old.append(link)
              if reason and not clean(target.get('疑似原因')):
                  target['疑似原因'] = reason
              if not clean(target.get('排序名')):
                  target['排序名'] = make_sort_name(target.get('账号名称') or account_name)

          target['来源Issue'] = f'#{issue_number}'
          target['最近提交日期'] = today
          data['更新时间'] = today
          data['账号'] = sorted(accounts, key=sort_key)
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          tiers = {'一级疑似': [], '二级疑似': [], '三级疑似': []}
          for src in sorted(source_dir.glob('*.json'), key=lambda p: norm(p.name)):
              src_data = json.loads(src.read_text(encoding='utf-8'))
              src_platform = src_data.get('平台', src.stem)
              src_accounts = sorted(src_data.get('账号', []), key=sort_key)
              src_data['账号'] = src_accounts
              src_data['更新时间'] = today
              src.write_text(json.dumps(src_data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
              for account in src_accounts:
                  if clean(account.get('状态')) == '已移除':
                      continue
                  level = tier_name(int(account.get('提交人数', 0)))
                  if level:
                      tiers[level].append({
                          '平台': src_platform,
                          '平台UID': clean(account.get('平台UID')),
                          '账号名称': clean(account.get('账号名称')),
                          '排序名': clean(account.get('排序名')),
                          '主页链接': clean(account.get('主页链接')),
                          '提交人数': int(account.get('提交人数', 0)),
                      })

          def write_tier(filename, title, description, rows):
              rows = sorted(rows, key=sort_key)
              lines = [
                  f'# {title}', '',
                  '> 本文件由 `数据源/*.json` 自动生成，请勿手动编辑。', '>',
                  f'> {description}', '>',
                  '> 排序规则：按 `排序名` 升序排列；中文按拼音，英文按 a-z。', '',
                  f'更新时间：{today}', '',
                  '| 序号 | 平台 | 平台UID | 账号名称 | 主页链接 | 提交人数 |',
                  '|---:|---|---|---|---|---:|',
              ]
              for i, item in enumerate(rows, start=1):
                  lines.append(f"| {i} | {item['平台']} | {item['平台UID']} | {item['账号名称']} | {md_link(item['主页链接'])} | {item['提交人数']} |")
              lines.append('')
              (out_dir / filename).write_text('\n'.join(lines), encoding='utf-8')

          write_tier('一级疑似.md', '一级疑似账号名单', '范围：1-5 名有效独立提交者。', tiers['一级疑似'])
          write_tier('二级疑似.md', '二级疑似账号名单', '范围：6-100 名有效独立提交者。', tiers['二级疑似'])
          write_tier('三级疑似.md', '三级疑似账号名单', '范围：101 名及以上有效独立提交者。', tiers['三级疑似'])

          pathlib.Path('处理结果.md').write_text(
              f'自动收录完成。\n\n- 处理类型：{changed_type}\n- 平台：{platform}\n- 平台 UID / 唯一标识：{uid}\n- 账号名称：{account_name}\n- 当前提交人数：{target.get("提交人数", 1)}\n- 数据源：`数据源/{platform_file[platform]}`\n',
              encoding='utf-8',
          )
          PY

      - name: Commit changes
        if: success()
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add 数据源 账号名单
            git commit -m "data: ingest issue #${ISSUE_NUMBER}"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Comment and close issue
        if: success()
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file 处理结果.md
          gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason completed
