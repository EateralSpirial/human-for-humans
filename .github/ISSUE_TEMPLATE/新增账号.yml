name: 新增疑似账号
description: 提交一个疑似 AI 内容账号
title: "[新增账号] 平台 / 账号名称 / UID"
labels:
  - 新增账号
  - 待审核
body:
  - type: markdown
    attributes:
      value: |
        请只提交公开账号与公开内容证据。不要提交私人信息，不要使用侮辱性描述。

  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - 抖音
        - 哔哩哔哩
        - 小红书
        - 微信公众号
        - 微信视频号
    validations:
      required: true

  - type: input
    id: account_name
    attributes:
      label: 账号名称
      placeholder: 请输入账号显示名
    validations:
      required: true

  - type: input
    id: platform_uid
    attributes:
      label: 平台 UID / 唯一标识
      placeholder: 请输入平台内唯一 ID，尽量不要只填昵称
    validations:
      required: true

  - type: input
    id: homepage
    attributes:
      label: 主页链接
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 证据链接
      description: 请提供公开内容链接，每行一个。
      placeholder: |
        https://...
        https://...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 疑似原因
      description: 请描述具体观察，不要做人身攻击。
      placeholder: 例如：文案结构高度重复、疑似 AI 口播、图片存在疑似 AI 生成痕迹等。
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: 提交确认
      options:
        - label: 我确认只提交公开账号与公开内容证据。
          required: true
        - label: 我理解本项目记录的是疑似 AI 内容账号，不代表最终事实认定。
          required: true
