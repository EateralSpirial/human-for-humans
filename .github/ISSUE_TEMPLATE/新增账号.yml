name: 新增疑似账号
description: 提交一个疑似 AI 内容账号
title: "[新增账号] 账号名称 / UID"
labels:
  - 新增账号
  - 待审核
body:
  - type: markdown
    attributes:
      value: |
        只需要填写账号名称和平台 UID / 唯一标识即可提交。其他信息可以选填，维护者后续复核补充。

  - type: input
    id: platform_uid
    attributes:
      label: 平台 UID / 唯一标识
      description: 必填。请尽量填写平台内稳定 ID；如果只能找到主页链接，也可以先填主页链接。
      placeholder: 例如：123456789 / BV号关联账号ID / 小红书号 / 公众号ID / 视频号ID
    validations:
      required: true

  - type: input
    id: account_name
    attributes:
      label: 账号名称
      description: 必填。请输入账号当前显示名。
      placeholder: 请输入账号显示名
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 平台
      description: 选填。不确定可以留空。
      options:
        - 不确定
        - 抖音
        - 哔哩哔哩
        - 小红书
        - 微信公众号
        - 微信视频号
    validations:
      required: false

  - type: input
    id: homepage
    attributes:
      label: 主页链接
      description: 选填。
      placeholder: https://...
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: 证据链接
      description: 选填。可以提供公开内容链接，每行一个。
      placeholder: |
        https://...
        https://...
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: 疑似原因
      description: 选填。请描述具体观察，不要做人身攻击。
      placeholder: 例如：文案结构高度重复、疑似 AI 口播、图片存在疑似 AI 生成痕迹等。
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: 提交确认
      options:
        - label: 我确认不会提交私人信息、侮辱性内容或人身攻击内容。
          required: true
